name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build-linux-x64:
    name: Build Linux x64
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo build --release
      - run: |
          cp target/release/tmux-taskgrid tmux-taskgrid-linux-x64
          sha256sum tmux-taskgrid-linux-x64 > tmux-taskgrid-linux-x64.sha256
      - uses: actions/upload-artifact@v4
        with:
          name: linux-x64
          path: tmux-taskgrid-linux-x64*

  build-linux-arm64:
    name: Build Linux ARM64
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-unknown-linux-gnu
      - run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu
      - run: cargo build --release --target aarch64-unknown-linux-gnu
        env:
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: aarch64-linux-gnu-gcc
      - run: |
          cp target/aarch64-unknown-linux-gnu/release/tmux-taskgrid tmux-taskgrid-linux-arm64
          sha256sum tmux-taskgrid-linux-arm64 > tmux-taskgrid-linux-arm64.sha256
      - uses: actions/upload-artifact@v4
        with:
          name: linux-arm64
          path: tmux-taskgrid-linux-arm64*

  release:
    name: Create GitHub Release
    needs: [build-linux-x64, build-linux-arm64]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**
          generate_release_notes: true
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
